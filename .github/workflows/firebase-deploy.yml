name: Deploy to Firebase Hosting

on:
  push:
    branches: ["master", "dev"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'prod' || 'stage' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_WASM_BASE_URL: ${{ secrets.VITE_WASM_BASE_URL }}
          VITE_DOWNLOAD_SERVER_URL: ${{ secrets.VITE_DOWNLOAD_SERVER_URL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting:${{ github.ref_name == 'master' && 'prod' || 'stage' }} --project ${{ secrets.FIREBASE_PROJECT_ID }}
